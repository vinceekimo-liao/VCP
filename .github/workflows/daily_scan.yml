name: Nightly VCP Scan

on:
  schedule:
    # 台灣時間 23:00 (UTC 15:00) → 啟動掃描
    - cron: '0 15 * * *'
    # 台灣時間 07:30 (UTC 23:30) → 發送報告
    - cron: '30 23 * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Start scan at 23:00
        if: github.event.schedule == '0 15 * * *'
        run: curl -X GET https://vcp-3ztx.onrender.com/start_scan

      - name: Send report at 07:30
        if: github.event.schedule == '30 23 * * *'
        run: curl -X GET https://vcp-3ztx.onrender.com/send_report